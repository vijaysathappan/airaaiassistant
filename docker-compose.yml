version: "3.9"

services:

  backend:
    build: ./healthcare_rag
    container_name: med_rag_backend
    ports:
      - "8000:8000"
    env_file:
      - ./healthcare_rag/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./healthcare_rag/faiss_index:/app/faiss_index

  frontend:
    build: ./med-rag-frontend
    container_name: med_rag_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  postgres:
    image: postgres:15
    container_name: med_rag_postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: root123456
      POSTGRES_DB: healthcare
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: med_rag_redis
    ports:
      - "6379:6379"