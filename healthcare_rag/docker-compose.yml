version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: healthcare_postgres
    restart: always
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: root123456
      POSTGRES_DB: healthcare
    ports:
      - "5432:5432"        # important: expose to host
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: healthcare_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
